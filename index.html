<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BNSF HAZMAT · Asset Readiness (Beta)</title>
<link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/dark/main.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    /* BNSF hazmat brand: orange #ee6e01 on warm charcoal (bnsfhazmat.com) */
    --bg:#151310;--surface:#1f1c18;--surface-alt:#2b2926;
    --accent:#ee6e01;--text:#e5e7eb;--text-dim:#9ca3af;--text-muted:#6b7280;
    --border:#3b372f;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--deployed:#3b82f6;
    --font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;overflow:hidden}
  #app{display:grid;grid-template-rows:48px 1fr;height:100%}
  header{display:flex;align-items:center;gap:10px;padding:0 12px;background:var(--surface);border-bottom:2px solid var(--accent)}
  header h1{font-size:15px;font-weight:700}
  header .logochip{background:#fff;border-radius:6px;padding:3px 7px;display:flex;align-items:center;flex:none}
  header .logochip img{height:18px;display:block}
  header .beta{font-size:10px;background:var(--accent);padding:2px 6px;border-radius:4px;font-weight:700}
  header .who{margin-left:auto;font-size:12px;color:var(--text-dim)}
  #main{display:grid;grid-template-columns:340px 1fr;min-height:0}
  #panel{display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);min-height:0}
  #tabs{display:flex;border-bottom:1px solid var(--border)}
  #tabs button{flex:1;padding:10px 4px;background:none;border:none;color:var(--text-dim);font-weight:600;font-size:13px;cursor:pointer;border-bottom:2px solid transparent}
  #tabs button.active{color:var(--text);border-bottom-color:var(--accent)}
  #search{margin:8px 8px 4px 8px;padding:9px 12px;background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;width:calc(100% - 16px)}
  #filters{display:flex;flex-wrap:wrap;gap:6px;padding:0 8px 8px 8px}
  #filters select{flex:1;min-width:45%;padding:7px 8px;background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12.5px}
  #filters select.on{border-color:var(--accent)}
  #fltCount{width:100%;font-size:11.5px;color:var(--text-muted);padding:0 2px}
  #fab{display:none;position:fixed;bottom:18px;left:14px;z-index:35;background:var(--accent);color:#fff;border:none;border-radius:24px;padding:12px 18px;font-weight:700;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.5);cursor:pointer}
  @media(max-width:760px){ #fab.show{display:block} }
  #list,#nearPanel{flex:1;overflow-y:auto;min-height:0}
  #list{display:none}  /* only the active tab's panel renders */
  .row{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:center}
  .row:hover,.row.sel{background:var(--surface-alt)}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .row .t{font-weight:600;font-size:13px}
  .row .s{font-size:12px;color:var(--text-dim)}
  .row .due{margin-left:auto;text-align:right;font-size:11px;color:var(--text-dim);flex:none}
  .badge{display:inline-block;padding:1px 7px;border-radius:9px;font-size:10.5px;font-weight:700}
  #mapDiv{width:100%;height:100%}
  #detail{position:absolute;top:0;right:0;width:380px;max-width:100%;height:100%;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;transform:translateX(105%);transition:transform .2s;z-index:40}
  #detail.open{transform:none}
  #detail .hd{position:sticky;top:0;background:var(--surface);padding:12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start}
  #detail h2{font-size:16px;line-height:1.25}
  #detail .x{margin-left:auto;background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;line-height:1}
  .sec{padding:10px 12px;border-bottom:1px solid var(--border)}
  .sec h3{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;cursor:pointer;user-select:none}
  .sec h3::before{content:"▾ ";color:var(--accent)}
  .sec.closed h3::before{content:"▸ "}
  .sec.closed h3{margin-bottom:0}
  .sec.closed > div{display:none}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:3px 10px;font-size:13px}
  .kv .k{color:var(--text-dim)}
  .clock{display:flex;gap:8px;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px dashed var(--border)}
  .clock:last-child{border-bottom:none}
  .clock .cn{flex:1}
  .clock .cd{color:var(--text-dim);font-size:12px}
  .eq{padding:5px 0;font-size:13px;border-bottom:1px dashed var(--border)}
  .eq:last-child{border-bottom:none}
  .eq .et{color:var(--text-dim);font-size:11.5px}
  .btns{display:flex;gap:8px;padding:12px}
  .btn{flex:1;padding:11px;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;color:#fff}
  .btn.red{background:var(--accent)} .btn.blue{background:var(--deployed)} .btn.gray{background:var(--surface-alt);color:var(--text)}
  #nearPanel{display:none;padding:10px 12px}
  #nearPanel.active,#list.active{display:block}
  #statsPanel{display:none;flex:1;overflow-y:auto;min-height:0;padding:10px 12px}
  #statsPanel.active{display:block}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .tile{background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .tile .tl{font-size:11.5px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
  .tile .tv{font-size:26px;font-weight:600;margin-top:2px}
  .rchart .rrow{margin-bottom:12px}
  .rchart .rl{font-size:12px;color:var(--text-dim);margin-bottom:3px;display:flex;justify-content:space-between;gap:8px}
  .rchart .rl b{color:var(--text)}
  .rbar{display:flex;height:18px;gap:2px}
  .rbar .seg{cursor:pointer;min-width:0}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11.5px;color:var(--text-dim);margin:4px 0 14px}
  .legend span{display:flex;align-items:center;gap:5px}
  #chartTip{position:fixed;background:var(--surface-alt);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;pointer-events:none;display:none;z-index:60}
  header .wri{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;font-size:10px;padding:3px 7px;cursor:pointer;font-weight:700;margin-left:8px}
  body.wri-tools header .wri{color:var(--warn);border-color:var(--warn)}
  #tabNear{display:none}
  body.wri-tools #tabNear{display:block}
  #btnMob{display:none}
  body.wri-tools #btnMob{display:block}
  #nearPanel .fld{margin-bottom:8px}
  #nearPanel input[type=text]{width:100%;padding:9px 12px;background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
  #nearPanel label{font-size:12px;color:var(--text-dim)}
  #nearHint{font-size:12px;color:var(--text-muted);margin:6px 0}
  .nrow{padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .nrow .d{color:var(--warn);font-weight:700}
  #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;z-index:99}
  .spin{width:34px;height:34px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface-alt);border:1px solid var(--border);padding:10px 18px;border-radius:8px;font-size:13.5px;display:none;z-index:98}
  @media(max-width:760px){
    #main{grid-template-columns:1fr}
    #panel{position:absolute;inset:48px 0 0 0;z-index:30;transition:transform .2s}
    #panel.hide{transform:translateX(-105%)}
    #detail{width:100%}
    #mapTab{display:block}
  }
  #mapTab{display:none}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><div id="loadMsg">Signing in to ArcGIS…</div></div>
<div id="toast"></div>
<div id="chartTip"></div>
<div id="app">
  <header>
    <span class="logochip"><img src="bnsf-hazmat-logo.png" alt="BNSF Hazmat"></span>
    <h1>Asset Readiness</h1><span class="beta">BETA</span>
    <span class="who" id="who"></span>
    <button class="wri" id="wriToggle" title="Show/hide WRI internal tools">WRI</button>
  </header>
  <div id="main">
    <div id="panel">
      <div id="tabs">
        <button id="tabList" class="active">Assets</button>
        <button id="tabStats">Stats</button>
        <button id="tabNear">Find Nearest</button>
        <button id="mapTab">Map</button>
      </div>
      <input id="search" type="text" placeholder="Search ID, name, warehouse, type…" style="display:block">
      <div id="filters"></div>
      <div id="list" class="active"></div>
      <div id="nearPanel">
        <div class="fld"><input id="nearTerm" type="text" placeholder="Capability: boom, skimmer, generator, SCBA, kit…"></div>
        <div class="btns" style="padding:0 0 8px 0">
          <button class="btn gray" id="nearGPS">Use my location</button>
          <button class="btn gray" id="nearClick">Click map</button>
          <button class="btn gray" id="nearClear">Clear</button>
        </div>
        <label><input type="checkbox" id="nearAll"> include deployed / unavailable</label>
        <div id="nearHint">Pick a location, then results rank by straight-line distance.</div>
        <div id="nearResults"></div>
      </div>
      <div id="statsPanel"></div>
    </div>
    <div id="mapDiv"></div>
  </div>
</div>
<button id="fab">&#9776; List</button>
<div id="detail">
  <div class="hd">
    <div><h2 id="dTitle"></h2><div id="dSub" style="font-size:12px;color:var(--text-dim);margin-top:3px"></div></div>
    <button class="x" id="dClose">&times;</button>
  </div>
  <div class="btns">
    <button class="btn blue" id="btnMob">Mobilize</button>
    <button class="btn gray" id="btnZoom">Zoom to</button>
    <button class="btn gray" id="btnDir">Directions</button>
  </div>
  <div class="btns" style="padding-top:0">
    <button class="btn red" id="btnInsp">DOT / Condition</button>
    <button class="btn red" id="btnCount">Inventory Count</button>
    <button class="btn gray" id="btnIssue">Report Issue</button>
  </div>
  <div class="btns" style="padding-top:0">
    <button class="btn gray" id="btnPrep">Site Visit Prep Sheet (printable)</button>
  </div>
  <div class="btns" style="padding-top:0">
    <button class="btn gray" id="btnInstr">Inspection &amp; Maintenance Instructions</button>
  </div>
  <div class="sec"><h3>Compliance clocks</h3><div id="dClocks"></div></div>
  <div class="sec closed" id="secHist"><h3>History</h3><div id="dHist" style="font-size:13px;color:var(--text-dim)">Loading…</div></div>
  <div class="sec"><h3>Identity</h3><div class="kv" id="dIdent"></div></div>
  <div class="sec"><h3>Equipment aboard</h3><div id="dEquip"></div></div>
  <div class="sec"><h3>Notes</h3><div id="dNotes" style="font-size:13px;color:var(--text-dim)">—</div></div>
</div>

<script src="https://js.arcgis.com/4.29/"></script>
<script>
require([
  "esri/identity/OAuthInfo","esri/identity/IdentityManager",
  "esri/Map","esri/views/MapView","esri/layers/GraphicsLayer","esri/Graphic",
  "esri/geometry/Point","esri/layers/FeatureLayer"
], function(OAuthInfo, esriId, Map, MapView, GraphicsLayer, Graphic, Point, FeatureLayer){

const SVC = "https://services6.arcgis.com/Ji79lWGR5B33LhY7/arcgis/rest/services/WRI_BNSF_Asset_Readiness/FeatureServer";
const PORTAL = "https://www.arcgis.com";
const COLORS = {overdue:"#ef4444", due_soon:"#f59e0b", current:"#22c55e", deployed:"#3b82f6", none:"#6b7280"};
const SEVERITY = {overdue:0, due_soon:1, current:2, suspended:3};
// The 8 BNSF regions, keyed by hazmat manager (assets.hazmat_manager), west→east
const REGION_ORDER = ["Justin Piper","James Farner","Jeff Hankins","Peter Killman",
                      "Paul Hester","Derek Lampkin","Mike Sheehan","Travis Hudson"];
const REGION_LABEL = {
  "Justin Piper":"Piper · WA/OR/BC/ID", "James Farner":"Farner · CA/NV/AZ",
  "Jeff Hankins":"Hankins · NM/CO/UT",  "Peter Killman":"Killman · MT/WY",
  "Paul Hester":"Hester · ND/MB/MN/WI", "Derek Lampkin":"Lampkin · SD/NE/KS/IA",
  "Mike Sheehan":"Sheehan · MO/AR/IL/KY/TN/AL", "Travis Hudson":"Hudson · TX/OK/LA/MS",
};
// Region hues from the BNSF Hazmat Region Map (rev 05.01.26)
const REGION_COLORS = {
  "Justin Piper":"#7fa7d4", "James Farner":"#adc687", "Jeff Hankins":"#b3b3b3",
  "Peter Killman":"#a08cc8", "Paul Hester":"#a8846c", "Derek Lampkin":"#f0993e",
  "Mike Sheehan":"#e3cf58", "Travis Hudson":"#d98b93",
};
// Manager contacts from the same map (cell = mobile)
const REGION_CONTACT = {
  "Justin Piper":{email:"justin.piper@bnsf.com", cell:"360-553-8672"},
  "James Farner":{email:"james.farner@bnsf.com", cell:"909-267-5167"},
  "Jeff Hankins":{email:"jeffrey.hankins2@bnsf.com", cell:"505-218-3582"},
  "Peter Killman":{email:"peter.killman@bnsf.com", cell:"785-214-3248"},
  "Paul Hester":{email:"paul.hester@bnsf.com", cell:"612-619-8641"},
  "Derek Lampkin":{email:"derek.lampkin@bnsf.com", cell:"612-760-1365"},
  "Mike Sheehan":{email:"michael.sheehan@bnsf.com", cell:"509-430-6090"},
  "Travis Hudson":{email:"travis.hudson@bnsf.com", cell:"832-835-7397"},
};
const STATE_REGION = {};
[["Justin Piper","WA OR ID"], ["James Farner","CA NV AZ"], ["Jeff Hankins","NM CO UT"],
 ["Peter Killman","MT WY"], ["Paul Hester","ND MN WI"], ["Derek Lampkin","SD NE KS IA"],
 ["Mike Sheehan","MO AR IL KY TN AL"], ["Travis Hudson","TX OK LA MS"]
].forEach(([m, sts]) => sts.split(" ").forEach(s => STATE_REGION[s] = m));

const $ = id => document.getElementById(id);
const toast = m => { const t=$("toast"); t.textContent=m; t.style.display="block"; setTimeout(()=>t.style.display="none", 3200); };
const fmtDate = ms => ms ? new Date(ms).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}) : "—";
const title = s => (s||"").replace(/_/g," ").replace(/\b\w/g, c=>c.toUpperCase());

esriId.registerOAuthInfos([new OAuthInfo({appId:"4Fi59bD09H8vlidE", portalUrl:PORTAL, popup:false})]);

let assets = [], byId = {}, selected = null, view, gLayer, nearMode = false, nearPt = null;
const layers = {
  assets: new FeatureLayer({url: SVC + "/0"}),
  sched:  new FeatureLayer({url: SVC + "/11"}),
  equip:  new FeatureLayer({url: SVC + "/5"}),
  deploy: new FeatureLayer({url: SVC + "/10"}),
  insp:   new FeatureLayer({url: SVC + "/2"}),
  maint:  new FeatureLayer({url: SVC + "/7"}),
  issues: new FeatureLayer({url: SVC + "/4"}),
  baseline: new FeatureLayer({url: SVC + "/1"}),
};

async function qAll(lyr, outFields, geom){
  const fs = await lyr.queryFeatures({where:"1=1", outFields:[outFields||"*"], returnGeometry:!!geom, num:2000});
  return fs.features;
}

async function boot(){
  await esriId.checkSignInStatus(PORTAL + "/sharing").catch(() => esriId.getCredential(PORTAL + "/sharing"));
  const cred = await esriId.getCredential(PORTAL + "/sharing");
  $("who").textContent = cred.userId;
  $("loadMsg").textContent = "Loading fleet…";

  const [aF, sF, eF] = await Promise.all([qAll(layers.assets, "*", true), qAll(layers.sched), qAll(layers.equip)]);

  const equipByAsset = {}, equipById = {};
  eF.forEach(f => {
    const a = f.attributes;
    equipById[a.equip_id] = a;
    if (a.asset_equipment_id) (equipByAsset[a.asset_equipment_id] = equipByAsset[a.asset_equipment_id] || []).push(a);
  });

  const clocksByAsset = {};
  sF.forEach(f => {
    const c = f.attributes;
    let key = c.parent_key;
    if (c.parent_level === "equipment") {
      const eq = equipById[c.parent_key];
      key = eq && eq.asset_equipment_id;
      c._via = c.parent_key;
    }
    if (key) (clocksByAsset[key] = clocksByAsset[key] || []).push(c);
  });

  assets = aF.map(f => {
    const a = f.attributes;
    const clocks = (clocksByAsset[a.equipment_id] || []).sort((x,y) =>
      (SEVERITY[x.sched_status]??9)-(SEVERITY[y.sched_status]??9) || (x.due_date||9e15)-(y.due_date||9e15));
    const worst = clocks[0];
    const equip = equipByAsset[a.equipment_id] || [];
    const cap = [a.asset_type, a.asset_category, a.asset_name, a.cap_tags,
                 equip.map(e => e.equip_type + " " + (e.equip_id||"")).join(" ")].join(" ").toLowerCase();
    return {attrs:a, geom:f.geometry, clocks, worst, equip, cap,
            color: a.asset_status === "deployed" ? COLORS.deployed : COLORS[worst ? worst.sched_status : "none"]};
  });
  assets.sort((x,y) => (SEVERITY[x.worst?.sched_status]??9)-(SEVERITY[y.worst?.sched_status]??9)
                     || (x.worst?.due_date||9e15)-(y.worst?.due_date||9e15));
  byId = Object.fromEntries(assets.map(x => [x.attrs.equipment_id, x]));

  gLayer = new GraphicsLayer();
  // Region tint under the status dots (US states only; colors from the BNSF map)
  let regionLayer = null;
  try {
    const hex2rgba = (h, a) => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16), a];
    regionLayer = new FeatureLayer({
      url: "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/USA_States_Generalized_Boundaries/FeatureServer/0",
      definitionExpression: `STATE_ABBR IN (${Object.keys(STATE_REGION).map(s=>`'${s}'`).join(",")})`,
      popupEnabled: false, legendEnabled: false,
      renderer: {type:"unique-value", field:"STATE_ABBR",
        uniqueValueInfos: Object.entries(STATE_REGION).map(([st, mgr]) => ({
          value: st,
          symbol: {type:"simple-fill", color: hex2rgba(REGION_COLORS[mgr], 0.22),
                   outline: {color:[255,255,255,0.12], width:0.5}}}))}
    });
  } catch(e){ console.warn("region overlay unavailable", e); }
  view = new MapView({
    container:"mapDiv", map:new Map({basemap:"dark-gray-vector",
      layers: regionLayer ? [regionLayer, gLayer] : [gLayer]}),
    center:[-105,44], zoom:4, popupEnabled:false,
    ui:{components:["zoom"]}
  });
  drawMarkers(assets);
  view.on("click", async ev => {
    if (nearMode){ nearPt = ev.mapPoint; nearMode=false; $("nearHint").textContent="Location set — ranking…"; runNearest(); return; }
    const hit = await view.hitTest(ev, {include:gLayer});
    const g = hit.results.find(r => r.graphic && r.graphic.attributes && r.graphic.attributes.eid);
    if (g) select(g.graphic.attributes.eid, false);
  });

  buildFilters();
  renderList(currentListItems());
  setTab("stats");   // land on the dashboard; Assets tab holds the list
  $("loader").style.display = "none";

  // QR / deep link: ?asset=<equipment_id> opens that asset directly
  const qp = new URLSearchParams(location.search).get("asset");
  if (qp){
    const x = byId[qp.trim()] || byId[qp.trim().toUpperCase()];
    if (x) select(x.attrs.equipment_id, true);
    else toast("Asset " + qp + " not found");
  }
}

// ---- attribute filters (built from whatever the data actually has) ----
const FILTER_DEFS = [
  ["hazmat_manager", "Region", v => REGION_LABEL[v] || v], ["contractor_name", "Contractor"],
  ["asset_type", "Type"], ["asset_status", "Status"],
  ["asset_category", "Category"],
];
const filterState = {};
// Per client 2026-07-20: legacy responders stay on assets but out of the filter
const FILTER_EXCLUDE = {contractor_name: new Set(["EWI",
  "PRAIRIE DU CHIEN FIRE DEPARTMENT", "SOUTH BOUNDARY FIRE PROTECTION DISTRICT"])};
function buildFilters(){
  const host = $("filters");
  host.innerHTML = "";
  FILTER_DEFS.forEach(([field, label, disp]) => {
    let vals = [...new Set(assets.map(x => x.attrs[field]).filter(Boolean))].sort();
    if (FILTER_EXCLUDE[field]) vals = vals.filter(v => !FILTER_EXCLUDE[field].has(v));
    if (!vals.length) return;  // e.g. hazmat_manager appears once data exists
    const sel = document.createElement("select");
    sel.id = "flt_" + field;
    sel.innerHTML = `<option value="">${label} (all)</option>` +
      vals.map(v => `<option value="${v}">${disp ? disp(v) : title(String(v))}</option>`).join("");
    sel.onchange = () => {
      filterState[field] = sel.value || null;
      sel.classList.toggle("on", !!sel.value);
      renderList(currentListItems());
    };
    host.appendChild(sel);
  });
  const cnt = document.createElement("div");
  cnt.id = "fltCount";
  host.appendChild(cnt);
}

function drawMarkers(items){
  gLayer.removeAll();
  if (window._nearMarker) gLayer.add(window._nearMarker);
  items.forEach(x => {
    if (!x.geom) return;
    gLayer.add(new Graphic({
      geometry: x.geom, attributes: {eid: x.attrs.equipment_id},
      symbol: {type:"simple-marker", color:x.color, size:9,
               outline:{color: selected===x.attrs.equipment_id ? "#fff" : "#0a0c10", width:1.4}}
    }));
  });
}

function badge(st){ return `<span class="badge" style="background:${COLORS[st]||COLORS.none};color:#0a0c10">${title(st||"no clocks")}</span>`; }

function renderList(items){
  $("list").innerHTML = items.map(x => {
    const a = x.attrs, w = x.worst;
    return `<div class="row ${selected===a.equipment_id?"sel":""}" data-eid="${a.equipment_id}">
      <span class="dot" style="background:${x.color}"></span>
      <div><div class="t">${a.equipment_id}</div><div class="s">${title(a.asset_type)} · ${(a.current_warehouse||a.staging_desc||"").split(" - ").pop()||""}</div></div>
      <div class="due">${w ? title(w.sched_type)+"<br>"+fmtDate(w.due_date) : "no clocks"}</div>
    </div>`;
  }).join("");
  $("list").querySelectorAll(".row").forEach(r => r.onclick = () => select(r.dataset.eid, true));
  const c = $("fltCount");
  if (c) c.textContent = `${items.length} of ${assets.length} assets shown`;
  drawMarkers(items);   // map mirrors the active filters
}

function select(eid, zoom){
  selected = eid;
  const x = byId[eid]; if (!x) return;
  const a = x.attrs;
  $("dTitle").textContent = a.equipment_id;
  $("dSub").innerHTML = `${title(a.asset_type)} · ${badge(a.asset_status==="deployed"?"deployed":(x.worst?x.worst.sched_status:"none"))}`;
  $("dClocks").innerHTML = x.clocks.length ? x.clocks.map(c =>
    `<div class="clock"><span class="dot" style="background:${COLORS[c.sched_status]||COLORS.none}"></span>
     <div class="cn">${title(c.sched_type)}${c._via?`<div class="cd">on ${c._via}</div>`:""}
     ${c.sched_source==="derived"?`<div class="cd">derived date</div>`:""}</div>
     <div class="cd">due ${fmtDate(c.due_date)}</div></div>`).join("") : "<div style='color:var(--text-muted);font-size:13px'>No clocks on record</div>";
  const mgr = a.hazmat_manager, mc = REGION_CONTACT[mgr];
  const regionRow = mgr ? `<span class="dot" style="background:${REGION_COLORS[mgr]||"#666"};display:inline-block;margin-right:5px"></span>${REGION_LABEL[mgr]||mgr}` : null;
  const mgrRow = mc ? `${mgr} · <a href="tel:${mc.cell}" style="color:var(--deployed)">${mc.cell}</a> · <a href="mailto:${mc.email}" style="color:var(--deployed)">email</a>` : null;
  const kv = [["Name",a.asset_name],["Status",title(a.asset_status)],
    ["Region",regionRow],["Hazmat mgr",mgrRow],["Contractor",a.contractor_name],
    ["Warehouse",a.current_warehouse],
    ["Base",a.base_warehouse],["Address",a.staging_desc],["WRI region",a.wri_region],
    ["VIN",a.vin],["Plate",[a.plate_number,a.plate_state].filter(Boolean).join(" ")],
    ["Tire year",a.tire_mfg_year],["GPS #",a.gps_tracking_num],["Holman",a.holman_no]];
  $("dIdent").innerHTML = kv.filter(p=>p[1]).map(p=>`<div class="k">${p[0]}</div><div>${p[1]}</div>`).join("");
  const maintKind = t => t==="generator" ? "gen" : (t==="hyd_power_pack" ? "hpp" : null);
  $("dEquip").innerHTML = x.equip.length ? x.equip.map(e => {
    const mk = maintKind(e.equip_type);
    const btn = mk ? ` <a href="#" onclick="openMaint('${mk}','${String(e.GlobalID).replace(/[{}]/g,"")}','${(e.equip_id||"").replace(/'/g,"")}');return false" style="color:var(--warn);font-size:11.5px;font-weight:700">Log maintenance →</a>` : "";
    return `<div class="eq"><b>${e.equip_id}</b>${btn}<div class="et">${title(e.equip_type)}${e.serial_num?" · SN "+e.serial_num:""}</div></div>`;
  }).join("") : "<div style='color:var(--text-muted);font-size:13px'>None linked (see parent-inference review)</div>";
  $("dNotes").textContent = a.asset_notes || "—";
  $("btnMob").textContent = a.asset_status === "deployed" ? "Return from incident" : "Mobilize";
  $("btnMob").className = "btn " + (a.asset_status === "deployed" ? "red" : "blue");
  $("detail").classList.add("open");
  loadHistory(x);
  renderList(currentListItems());
  if (zoom && x.geom) view.goTo({target:x.geom, zoom:9});
  if (window.innerWidth<=760) hidePanel();
}

function currentListItems(){

// ---- history (inspections + maintenance, newest first) ----
async function loadHistory(x){
  const host = $("dHist");
  host.textContent = "Loading…";
  try {
    const guid = String(x.attrs.GlobalID).replace(/[{}]/g,"");
    const events = [];
    const inspFs = await layers.insp.queryFeatures({where:`asset_guid='{${guid}}'`,
        outFields:["insp_type","insp_status","insp_date","inspector_name","insp_notes"],
        orderByFields:["insp_date DESC"], num:200});
    inspFs.features.forEach(f => { const a=f.attributes;
      events.push({when:a.insp_date, label:title(a.insp_type)+(a.insp_notes&&a.insp_notes.includes("(migrated")?" — "+a.insp_notes.replace(" (migrated from platform)","")+"":""),
                   who:a.inspector_name, issues:a.insp_status==="completed_issues", kind:"Inspection"});
    });
    const eqGuids = x.equip.map(e => "'{"+String(e.GlobalID).replace(/[{}]/g,"")+"}'");
    if (eqGuids.length){
      const mFs = await layers.maint.queryFeatures({
        where:`equip_guid IN (${eqGuids.join(",")})`,
        outFields:["equip_id","event_date","performed_by","maint_status","event_notes"],
        orderByFields:["event_date DESC"], num:200});
      mFs.features.forEach(f => { const a=f.attributes;
        events.push({when:a.event_date, label:"Maintenance — "+a.equip_id,
                     who:a.performed_by, issues:a.maint_status==="completed_issues", kind:"Maintenance"});
      });
    }
    events.sort((p,q) => (q.when||0)-(p.when||0));
    host.innerHTML = events.length ? events.slice(0,40).map(e =>
      `<div class="clock"><div class="cn">${e.label}${e.issues?' <span class="badge" style="background:var(--warn);color:#0a0c10">issues</span>':""}
       ${e.who?`<div class="cd">${e.who}</div>`:""}</div><div class="cd">${fmtDate(e.when)}</div></div>`).join("")
      + (events.length>40?`<div class="cd" style="padding-top:6px">…and ${events.length-40} older records</div>`:"")
      : "No history on record";
  } catch(err){ console.error(err); host.textContent = "History unavailable: " + (err.message||err); }
}

// ---- Stats tab (tiles + status-by-region bars; counts from already-loaded data) ----
let openIssueCount = null;
function buildStats(){
  const worstOf = x => { const s = x.worst ? x.worst.sched_status : "none";
                         return (s in COLORS && s !== "deployed") ? s : "none"; };
  const c = {overdue:0, due_soon:0, current:0, none:0, deployed:0};
  assets.forEach(x => { c[worstOf(x)]++; if (x.attrs.asset_status === "deployed") c.deployed++; });

  const regions = {};
  assets.forEach(x => {
    const r = x.attrs.hazmat_manager || "Unassigned";
    const g = regions[r] = regions[r] || {overdue:0, due_soon:0, current:0, none:0, total:0};
    g[worstOf(x)]++; g.total++;
  });
  const regionKeys = [...REGION_ORDER.filter(r => regions[r]),
                      ...Object.keys(regions).filter(r => !REGION_ORDER.includes(r)).sort()];
  const maxTotal = Math.max(...regionKeys.map(r => regions[r].total), 1);

  const tile = (label, val, color) =>
    `<div class="tile"><div class="tl"><span class="dot" style="background:${color}"></span>${label}</div>
     <div class="tv">${val}</div></div>`;
  const SEGS = [["overdue","Overdue"],["due_soon","Due ≤ 90 days"],["current","Current"],["none","No clocks"]];
  const rows = regionKeys.map(r => {
    const g = regions[r];
    const segs = SEGS.filter(([k]) => g[k] > 0);
    const bars = segs.map(([k, lbl], i) =>
      `<div class="seg" data-r="${r}" data-lbl="${lbl}" data-n="${g[k]}"
        style="width:${(g[k] / maxTotal * 100).toFixed(2)}%;background:${COLORS[k]};
        ${i === segs.length - 1 ? "border-radius:0 4px 4px 0" : ""}"></div>`).join("");
    return `<div class="rrow"><div class="rl"><span><span class="dot" style="background:${REGION_COLORS[r]||"#666"};display:inline-block;margin-right:5px"></span>${REGION_LABEL[r] || r}</span><b>${g.total}</b></div>
            <div class="rbar">${bars || ""}</div></div>`;
  }).join("");

  $("statsPanel").innerHTML =
    `<div class="tiles">
      ${tile("Assets tracked", assets.length, "var(--text-muted)")}
      ${tile("Deployed to incident", c.deployed, COLORS.deployed)}
      ${tile("Service overdue", c.overdue, COLORS.overdue)}
      ${tile("Due ≤ 90 days", c.due_soon, COLORS.due_soon)}
      ${tile("Current", c.current, COLORS.current)}
      ${tile("Open issues", openIssueCount ?? "…", "var(--warn)")}
    </div>
    <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px">Status by region</div>
    <div class="legend">${SEGS.map(([k,l]) => `<span><span class="dot" style="background:${COLORS[k]}"></span>${l}</span>`).join("")}</div>
    <div class="rchart">${rows}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px">Worst clock per asset · statuses recomputed nightly · tap a bar to filter the list</div>
    <div style="margin-top:12px"><a href="instructions.html" target="_blank" style="color:var(--deployed);font-size:12.5px;font-weight:600">Inspection &amp; maintenance instructions →</a></div>`;

  const tip = $("chartTip");
  $("statsPanel").querySelectorAll(".seg").forEach(s => {
    s.onmousemove = e => { tip.style.display = "block"; tip.style.left = (e.clientX + 12) + "px";
      tip.style.top = (e.clientY + 12) + "px";
      tip.textContent = `${s.dataset.lbl}: ${s.dataset.n} — ${REGION_LABEL[s.dataset.r] || s.dataset.r}`; };
    s.onmouseleave = () => tip.style.display = "none";
    s.onclick = () => {
      tip.style.display = "none";
      const sel = $("flt_hazmat_manager");
      const val = s.dataset.r === "Unassigned" ? "" : s.dataset.r;
      filterState.hazmat_manager = val || null;
      if (sel){ sel.value = val; sel.classList.toggle("on", !!val); }
      setTab("list"); renderList(currentListItems());
    };
  });

  if (openIssueCount === null){
    openIssueCount = "…";
    layers.issues.queryFeatureCount({where:"issue_status IN ('open','in_progress')"})
      .then(n => { openIssueCount = n; })
      .catch(() => { openIssueCount = "—"; })
      .then(() => { if ($("statsPanel").classList.contains("active")) buildStats(); });
  }
}

// ---- Find Nearest ----
const R = 3958.8;
function distMi(lat1,lon1,lat2,lon2){
  const dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
$("nearGPS").onclick = () => navigator.geolocation.getCurrentPosition(
  p => { nearPt = new Point({latitude:p.coords.latitude, longitude:p.coords.longitude}); $("nearHint").textContent="Location set — ranking…"; runNearest(); },
  () => toast("Location unavailable — click the map instead"));
$("nearClick").onclick = () => { nearMode = true; $("nearHint").textContent="Now click the incident location on the map…"; if(window.innerWidth<=760) hidePanel(); };
$("nearTerm").oninput = runNearest;
$("nearAll").onchange = runNearest;
$("nearClear").onclick = () => {
  nearPt = null; nearMode = false;
  if (window._nearMarker){ gLayer.remove(window._nearMarker); window._nearMarker = null; }
  $("nearResults").innerHTML = "";
  $("nearHint").textContent = "Pick a location, then results rank by straight-line distance.";
};

function runNearest(){
  if (!nearPt) return;
  const term = $("nearTerm").value.trim().toLowerCase();
  const inclAll = $("nearAll").checked;
  let cands = assets.filter(x => x.geom);
  if (!inclAll) cands = cands.filter(x => x.attrs.asset_status === "available");
  if (term) cands = cands.filter(x => x.cap.includes(term));
  cands = cands.map(x => ({x, d: distMi(nearPt.latitude, nearPt.longitude, x.geom.latitude, x.geom.longitude)}))
               .sort((a,b) => a.d-b.d).slice(0,12);
  $("nearHint").textContent = cands.length ? "Straight-line distance — verify road access." : "No matching available assets.";
  $("nearResults").innerHTML = cands.map(({x,d}) =>
    `<div class="nrow" data-eid="${x.attrs.equipment_id}">
      <span class="d">${d.toFixed(0)} mi</span> · <b>${x.attrs.equipment_id}</b> ${x.attrs.asset_status!=="available"?badge("deployed"):""}
      <div style="font-size:12px;color:var(--text-dim)">${title(x.attrs.asset_type)} · ${x.attrs.current_warehouse||""}</div>
    </div>`).join("");
  $("nearResults").querySelectorAll(".nrow").forEach(r => r.onclick = () => select(r.dataset.eid, true));
  if (window._nearMarker) gLayer.remove(window._nearMarker);
  window._nearMarker = new Graphic({geometry:nearPt, symbol:{type:"simple-marker", style:"x", color:"#fff", size:14, outline:{color:"#ee6e01", width:3}}});
  gLayer.add(window._nearMarker);
}

  try {
    if (a.asset_status !== "deployed") {
      const inc = prompt("Incident ID (e.g. 2607MISSOURI):"); if (!inc) return;
      const name = prompt("Incident name (optional):") || null;
      const cred = await esriId.getCredential(PORTAL + "/sharing");
      await layers.deploy.applyEdits({addFeatures:[{attributes:{
        asset_guid: a.GlobalID, asset_equipment_id: a.equipment_id,
        incident_id: inc, incident_name: name, deploy_status: "mobilized",
        mobilized_date: Date.now(), mobilized_by: cred.userId,
        app_version: "webapp-beta", source_device: "browser"}}]});
      await layers.assets.applyEdits({updateFeatures:[{attributes:{OBJECTID: a.OBJECTID, asset_status: "deployed"}}]});
      a.asset_status = "deployed";
      toast(a.equipment_id + " mobilized to " + inc);
    } else {
      const q = await layers.deploy.queryFeatures({where:`asset_equipment_id='${a.equipment_id}' AND deploy_status='mobilized'`, outFields:["*"], num:1, orderByFields:["mobilized_date DESC"]});
      const cred = await esriId.getCredential(PORTAL + "/sharing");
      if (q.features.length){
        const d = q.features[0].attributes;
        await layers.deploy.applyEdits({updateFeatures:[{attributes:{OBJECTID:d.OBJECTID, deploy_status:"returned", returned_date:Date.now(), returned_by:cred.userId}}]});
      }
      await layers.assets.applyEdits({updateFeatures:[{attributes:{OBJECTID:a.OBJECTID, asset_status:"available"}}]});
      a.asset_status = "available";
      toast(a.equipment_id + " returned — post-deployment inspection required");
    }
    x.color = a.asset_status === "deployed" ? COLORS.deployed : COLORS[x.worst ? x.worst.sched_status : "none"];
    select(a.equipment_id, false);
  } catch(e){ console.error(e); toast("Edit failed: " + (e.message||e)); }
};

boot().catch(e => { console.error(e); $("loadMsg").textContent = "Failed to load: " + (e.message||e); });
});
</script>
</body>
</html>
