<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BNSF HAZMAT · Asset Readiness (Beta)</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/dark/main.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    /* BNSF hazmat brand: orange #ee6e01 on warm charcoal (bnsfhazmat.com) */
    --bg:#151310;--surface:#1f1c18;--surface-alt:#2b2926;
    --accent:#ee6e01;--text:#e5e7eb;--text-dim:#9ca3af;--text-muted:#6b7280;
    --border:#3b372f;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--deployed:#3b82f6;
    --font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;overflow:hidden}
  #app{display:grid;grid-template-rows:48px 1fr;height:100%}
  header{display:flex;align-items:center;gap:10px;padding:0 12px;background:var(--surface);border-bottom:2px solid var(--accent)}
  header h1{font-size:15px;font-weight:700}
  header .logochip{background:#fff;border-radius:6px;padding:3px 7px;display:flex;align-items:center;flex:none}
  header .logochip img{height:18px;display:block}
  header .beta{font-size:10px;background:var(--accent);padding:2px 6px;border-radius:4px;font-weight:700}
  header .who{margin-left:auto;font-size:12px;color:var(--text-dim)}
  #main{display:grid;grid-template-columns:340px 1fr;min-height:0}
  #panel{display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);min-height:0}
  #tabs{display:flex;border-bottom:1px solid var(--border)}
  #tabs button{flex:1;padding:10px 4px;background:none;border:none;color:var(--text-dim);font-weight:600;font-size:13px;cursor:pointer;border-bottom:2px solid transparent}
  #tabs button.active{color:var(--text);border-bottom-color:var(--accent)}
  #search{margin:8px 8px 4px 8px;padding:9px 12px;background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;width:calc(100% - 16px)}
  #filters{display:flex;flex-wrap:wrap;gap:6px;padding:0 8px 8px 8px}
  #filters select{flex:1;min-width:45%;padding:7px 8px;background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12.5px}
  #filters select.on{border-color:var(--accent)}
  #fltCount{width:100%;font-size:11.5px;color:var(--text-muted);padding:0 2px}
  #fab{display:none;position:fixed;bottom:18px;left:14px;z-index:35;background:var(--accent);color:#fff;border:none;border-radius:24px;padding:12px 18px;font-weight:700;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.5);cursor:pointer}
  @media(max-width:760px){ #fab.show{display:block} }
  #list,#nearPanel{flex:1;overflow-y:auto;min-height:0}
  #list{display:none}  /* only the active tab's panel renders */
  .row{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:center}
  .row:hover,.row.sel{background:var(--surface-alt)}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .row .t{font-weight:600;font-size:13px}
  .row .s{font-size:12px;color:var(--text-dim)}
  .row .due{margin-left:auto;text-align:right;font-size:11px;color:var(--text-dim);flex:none}
  .badge{display:inline-block;padding:1px 7px;border-radius:9px;font-size:10.5px;font-weight:700}
  #mapDiv{width:100%;height:100%}
  #detail{position:absolute;top:0;right:0;width:380px;max-width:100%;height:100%;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;transform:translateX(105%);transition:transform .2s;z-index:40}
  #detail.open{transform:none}
  #detail .hd{position:sticky;top:0;background:var(--surface);padding:12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start}
  #detail h2{font-size:16px;line-height:1.25}
  #detail .x{margin-left:auto;background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;line-height:1}
  .sec{padding:10px 12px;border-bottom:1px solid var(--border)}
  .sec h3{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;cursor:pointer;user-select:none}
  .sec h3::before{content:"▾ ";color:var(--accent)}
  .sec.closed h3::before{content:"▸ "}
  .sec.closed h3{margin-bottom:0}
  .sec.closed > div{display:none}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:3px 10px;font-size:13px}
  .kv .k{color:var(--text-dim)}
  .clock{display:flex;gap:8px;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px dashed var(--border)}
  .clock:last-child{border-bottom:none}
  .clock .cn{flex:1}
  .clock .cd{color:var(--text-dim);font-size:12px}
  .eq{padding:5px 0;font-size:13px;border-bottom:1px dashed var(--border)}
  .eq:last-child{border-bottom:none}
  .eq .et{color:var(--text-dim);font-size:11.5px}
  .btns{display:flex;gap:8px;padding:12px}
  .btn{flex:1;padding:11px;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;color:#fff}
  .btn.red{background:var(--accent)} .btn.blue{background:var(--deployed)} .btn.gray{background:var(--surface-alt);color:var(--text)}
  #nearPanel{display:none;padding:10px 12px}
  #nearPanel.active,#list.active{display:block}
  #statsPanel{display:none;flex:1;overflow-y:auto;min-height:0;padding:10px 12px}
  #statsPanel.active{display:block}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .tile{background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .tile.click{cursor:pointer}
  .tile.on{border-color:var(--accent)}
  .tile .tl{font-size:11.5px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
  .tile .tv{font-size:26px;font-weight:600;margin-top:2px}
  .rchart .rrow{margin-bottom:12px}
  .rchart .rl{font-size:12px;color:var(--text-dim);margin-bottom:3px;display:flex;justify-content:space-between;gap:8px}
  .rchart .rl b{color:var(--text)}
  .rbar{display:flex;height:18px;gap:2px}
  .rbar .seg{cursor:pointer;min-width:0}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11.5px;color:var(--text-dim);margin:4px 0 14px}
  .legend span{display:flex;align-items:center;gap:5px}
  #chartTip{position:fixed;background:var(--surface-alt);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;pointer-events:none;display:none;z-index:60}
  header .wri{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;font-size:10px;padding:3px 7px;cursor:pointer;font-weight:700;margin-left:8px}
  body.wri-tools header .wri{color:var(--warn);border-color:var(--warn)}
  #tabNear{display:none}
  body.wri-tools #tabNear{display:block}
  #btnMob{display:none}
  body.wri-tools #btnMob{display:block}
  #nearPanel .fld{margin-bottom:8px}
  #nearPanel input[type=text]{width:100%;padding:9px 12px;background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
  #nearPanel label{font-size:12px;color:var(--text-dim)}
  #nearHint{font-size:12px;color:var(--text-muted);margin:6px 0}
  .nrow{padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .nrow .d{color:var(--warn);font-weight:700}
  #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;z-index:99}
  .spin{width:34px;height:34px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--surface-alt);border:1px solid var(--border);padding:10px 18px;border-radius:8px;font-size:13.5px;display:none;z-index:98}
  @media(max-width:760px){
    #main{grid-template-columns:1fr}
    #panel{position:absolute;inset:48px 0 0 0;z-index:30;transition:transform .2s}
    #panel.hide{transform:translateX(-105%)}
    #detail{width:100%}
    #mapTab{display:block}
    #btnZoom{display:none}  /* detail covers the map on phones — nothing to zoom to */
    /* Map tab: keep the tab strip pinned, collapse the panel body so the map shows through */
    #panel.maponly{inset:48px 0 auto 0;height:auto;border-right:none}
    #panel.maponly #search,#panel.maponly #filters,#panel.maponly #list,
    #panel.maponly #nearPanel,#panel.maponly #statsPanel{display:none !important}
  }
  .auditbox{margin:0 12px 12px;border:1.5px solid var(--accent);border-radius:10px;padding:10px}
  .auditbox .abt{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:800;margin-bottom:8px}
  .auditbox .btns{padding:0}
  .auditbox .btns+.btns{padding-top:8px}
  #lnkInv{display:inline-block;margin-top:8px;color:var(--deployed);font-size:13px;font-weight:600;text-decoration:none}
  /* in-app overlay: surveys, instructions, inventory stay on-site */
  #overlay{position:fixed;inset:0;background:var(--bg);z-index:80;display:none;flex-direction:column}
  #overlay.open{display:flex}
  #overlay .ohd{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);border-bottom:2px solid var(--accent);flex:none}
  #oBack{background:var(--surface-alt);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 14px;font-weight:700;font-size:14px;cursor:pointer;flex:none}
  #oTitle{font-weight:700;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #oExt{color:var(--text-dim);font-size:12px;text-decoration:none;flex:none}
  #oFrame{flex:1;border:0;background:#fff;width:100%}
  #oBody{flex:1;overflow-y:auto;padding:12px;display:none;width:100%;max-width:760px;margin:0 auto}
  .invcat{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);font-weight:800;margin:14px 0 4px}
  .invrow{display:flex;gap:10px;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:13.5px}
  .invrow .invq{flex:none;font-weight:600}
  .invrow.bad .invq{color:var(--warn);font-weight:700}
  .invx{font-size:11px;color:var(--text-muted);font-weight:400}
  .invn{font-size:11.5px;color:var(--warn)}
  #mapTab{display:none}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><div id="loadMsg">Signing in to ArcGIS…</div></div>
<div id="toast"></div>
<div id="chartTip"></div>
<div id="app">
  <header>
    <span class="logochip"><img src="bnsf-hazmat-logo.png" alt="BNSF Hazmat"></span>
    <h1>Asset Readiness</h1><span class="beta">BETA</span>
    <span class="who" id="who"></span>
    <button class="wri" id="wriToggle" title="Show/hide WRI internal tools">WRI</button>
  </header>
  <div id="main">
    <div id="panel">
      <div id="tabs">
        <button id="tabList" class="active">Assets</button>
        <button id="tabStats">Stats</button>
        <button id="tabNear">Find Nearest</button>
        <button id="mapTab">Map</button>
      </div>
      <input id="search" type="text" placeholder="Search ID, name, warehouse, type…" style="display:block">
      <div id="filters"></div>
      <div id="list" class="active"></div>
      <div id="nearPanel">
        <div class="fld"><input id="nearTerm" type="text" placeholder="Capability: boom, skimmer, generator, SCBA, kit…"></div>
        <div class="btns" style="padding:0 0 8px 0">
          <button class="btn gray" id="nearGPS">Use my location</button>
          <button class="btn gray" id="nearClick">Click map</button>
          <button class="btn gray" id="nearClear">Clear</button>
        </div>
        <label><input type="checkbox" id="nearAll"> include deployed / unavailable</label>
        <div id="nearHint">Pick a location, then results rank by straight-line distance.</div>
        <div id="nearResults"></div>
      </div>
      <div id="statsPanel"></div>
    </div>
    <div id="mapDiv"></div>
  </div>
</div>
<button id="fab">&#9776; List</button>
<div id="detail">
  <div class="hd">
    <div><h2 id="dTitle"></h2><div id="dSub" style="font-size:12px;color:var(--text-dim);margin-top:3px"></div></div>
    <button class="x" id="dClose">&times;</button>
  </div>
  <div class="btns">
    <button class="btn blue" id="btnMob">Mobilize</button>
    <button class="btn gray" id="btnZoom">Zoom to</button>
    <button class="btn gray" id="btnDir">Directions</button>
  </div>
  <div class="auditbox">
    <div class="abt" id="auditTitle">Trailer Audit</div>
    <div class="btns" id="auditRow1">
      <button class="btn red" id="btnInsp">DOT Annual</button>
      <button class="btn red" id="btnCount">Audit</button>
    </div>
    <div class="btns">
      <button class="btn red" id="btnIssue">Report Issue</button>
    </div>
  </div>
  <div class="btns" style="padding-top:0">
    <button class="btn gray" id="btnPrep">Site Visit Prep Sheet (printable)</button>
  </div>
  <div class="btns" style="padding-top:0">
    <button class="btn gray" id="btnInstr">Inspection &amp; Maintenance Instructions</button>
  </div>
  <div class="sec"><h3>Compliance clocks</h3><div id="dClocks"></div></div>
  <div class="sec closed" id="secHist"><h3>History</h3><div id="dHist" style="font-size:13px;color:var(--text-dim)">Loading…</div></div>
  <div class="sec"><h3>Identity</h3><div><div class="kv" id="dIdent"></div>
    <a href="#" id="lnkInv">View up-to-date inventory &#8594;</a></div></div>
  <div class="sec"><h3>Equipment aboard</h3><div id="dEquip"></div></div>
  <div class="sec"><h3>Notes &amp; what to bring</h3><div id="dNotes" style="font-size:13px;color:var(--text-dim)">—</div></div>
</div>
<div id="overlay">
  <div class="ohd">
    <button id="oBack">&#8592; Back</button>
    <span id="oTitle"></span>
    <a id="oExt" href="#" target="_blank" rel="noopener">Open in tab &#8599;</a>
  </div>
  <iframe id="oFrame" title="embedded content"></iframe>
  <div id="oBody"></div>
</div>

<script src="https://js.arcgis.com/4.29/"></script>
<script>
require([
  "esri/identity/OAuthInfo","esri/identity/IdentityManager",
  "esri/Map","esri/views/MapView","esri/layers/GraphicsLayer","esri/Graphic",
  "esri/geometry/Point","esri/layers/FeatureLayer"
], function(OAuthInfo, esriId, Map, MapView, GraphicsLayer, Graphic, Point, FeatureLayer){

const SVC = "https://services6.arcgis.com/Ji79lWGR5B33LhY7/arcgis/rest/services/WRI_BNSF_Asset_Readiness/FeatureServer";
const PORTAL = "https://www.arcgis.com";
const COLORS = {overdue:"#ef4444", due_soon:"#f59e0b", current:"#22c55e", deployed:"#3b82f6", none:"#6b7280"};
const SEVERITY = {overdue:0, due_soon:1, current:2, suspended:3};
// The 8 BNSF regions, keyed by hazmat manager (assets.hazmat_manager), west→east
const REGION_ORDER = ["Justin Piper","James Farner","Jeff Hankins","Peter Killman",
                      "Paul Hester","Derek Lampkin","Mike Sheehan","Travis Hudson"];
const REGION_LABEL = {
  "Justin Piper":"Piper · WA/OR/BC/ID", "James Farner":"Farner · CA/NV/AZ",
  "Jeff Hankins":"Hankins · NM/CO/UT",  "Peter Killman":"Killman · MT/WY",
  "Paul Hester":"Hester · ND/MB/MN/WI", "Derek Lampkin":"Lampkin · SD/NE/KS/IA",
  "Mike Sheehan":"Sheehan · MO/AR/IL/KY/TN/AL", "Travis Hudson":"Hudson · TX/OK/LA/MS",
};
// Region hues from the BNSF Hazmat Region Map (rev 05.01.26)
const REGION_COLORS = {
  "Justin Piper":"#7fa7d4", "James Farner":"#adc687", "Jeff Hankins":"#b3b3b3",
  "Peter Killman":"#a08cc8", "Paul Hester":"#a8846c", "Derek Lampkin":"#f0993e",
  "Mike Sheehan":"#e3cf58", "Travis Hudson":"#d98b93",
};
// Manager contacts from the same map (cell = mobile)
const REGION_CONTACT = {
  "Justin Piper":{email:"justin.piper@bnsf.com", cell:"360-553-8672"},
  "James Farner":{email:"james.farner@bnsf.com", cell:"909-267-5167"},
  "Jeff Hankins":{email:"jeffrey.hankins2@bnsf.com", cell:"505-218-3582"},
  "Peter Killman":{email:"peter.killman@bnsf.com", cell:"785-214-3248"},
  "Paul Hester":{email:"paul.hester@bnsf.com", cell:"612-619-8641"},
  "Derek Lampkin":{email:"derek.lampkin@bnsf.com", cell:"612-760-1365"},
  "Mike Sheehan":{email:"michael.sheehan@bnsf.com", cell:"509-430-6090"},
  "Travis Hudson":{email:"travis.hudson@bnsf.com", cell:"832-835-7397"},
};
const STATE_REGION = {};
[["Justin Piper","WA OR ID"], ["James Farner","CA NV AZ"], ["Jeff Hankins","NM CO UT"],
 ["Peter Killman","MT WY"], ["Paul Hester","ND MN WI"], ["Derek Lampkin","SD NE KS IA"],
 ["Mike Sheehan","MO AR IL KY TN AL"], ["Travis Hudson","TX OK LA MS"]
].forEach(([m, sts]) => sts.split(" ").forEach(s => STATE_REGION[s] = m));

const $ = id => document.getElementById(id);
const toast = m => { const t=$("toast"); t.textContent=m; t.style.display="block"; setTimeout(()=>t.style.display="none", 3200); };
const fmtDate = ms => ms ? new Date(ms).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}) : "—";
const title = s => (s||"").replace(/_/g," ").replace(/\b\w/g, c=>c.toUpperCase());
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");
// One label set for clocks, history, buttons, and survey titles — platform
// schedule naming (clock codes and migrated history codes both map in)
const TYPE_LABEL = {
  dot_inspection:"DOT Annual", dot_annual:"DOT Annual",
  bit_inspection:"BIT Annual", bit_annual:"BIT Annual",
  audit_inventory:"Audit Inventory", audit_resolution:"Resolution Visit", hpp_maint:"HPP Maint",
  generator_maint:"Generator Maint", fire_pump_maint:"Fire Pump Maint",
  compressor_maint:"Compressor Maint", equip_id_verify:"Equipment ID Check",
  ics_trailer_maint:"ICS Trailer Maint", hyd_reel_trailer_maint:"Hydraulic Reel Trailer Maint",
};
const tlabel = t => TYPE_LABEL[t] || title(t);
// Same category cleanup the tailored inventory survey applies at build time
const catLabel = c => String(c||"Other items").split("(")[0].trim() || "Other items";

esriId.registerOAuthInfos([new OAuthInfo({appId:"4Fi59bD09H8vlidE", portalUrl:PORTAL, popup:false})]);

let assets = [], byId = {}, byGuid = {}, selected = null, view, gLayer, nearMode = false, nearPt = null;
const layers = {
  assets: new FeatureLayer({url: SVC + "/0"}),
  sched:  new FeatureLayer({url: SVC + "/11"}),
  equip:  new FeatureLayer({url: SVC + "/5"}),
  deploy: new FeatureLayer({url: SVC + "/10"}),
  insp:   new FeatureLayer({url: SVC + "/2"}),
  maint:  new FeatureLayer({url: SVC + "/7"}),
  mtasks: new FeatureLayer({url: SVC + "/8"}),
  issues: new FeatureLayer({url: SVC + "/4"}),
  baseline: new FeatureLayer({url: SVC + "/1"}),
  counts: new FeatureLayer({url: SVC + "/3"}),
};

async function qAll(lyr, outFields, geom){
  const fs = await lyr.queryFeatures({where:"1=1", outFields:[outFields||"*"], returnGeometry:!!geom, num:2000});
  return fs.features;
}

async function boot(){
  await esriId.checkSignInStatus(PORTAL + "/sharing").catch(() => esriId.getCredential(PORTAL + "/sharing"));
  const cred = await esriId.getCredential(PORTAL + "/sharing");
  $("who").textContent = cred.userId;
  $("loadMsg").textContent = "Loading fleet…";

  const [aF, sF, eF] = await Promise.all([qAll(layers.assets, "*", true), qAll(layers.sched), qAll(layers.equip)]);

  const equipByAsset = {}, equipById = {};
  eF.forEach(f => {
    const a = f.attributes;
    equipById[a.equip_id] = a;
    if (a.asset_equipment_id) (equipByAsset[a.asset_equipment_id] = equipByAsset[a.asset_equipment_id] || []).push(a);
  });

  const clocksByAsset = {};
  sF.forEach(f => {
    const c = f.attributes;
    let key = c.parent_key;
    if (c.parent_level === "equipment") {
      const eq = equipById[c.parent_key];
      key = eq && eq.asset_equipment_id;
      c._via = c.parent_key;
    }
    if (key) (clocksByAsset[key] = clocksByAsset[key] || []).push(c);
  });

  assets = aF.map(f => {
    const a = f.attributes;
    const clocks = (clocksByAsset[a.equipment_id] || []).sort((x,y) =>
      (SEVERITY[x.sched_status]??9)-(SEVERITY[y.sched_status]??9) || (x.due_date||9e15)-(y.due_date||9e15));
    const worst = clocks[0];
    const equip = equipByAsset[a.equipment_id] || [];
    const cap = [a.asset_type, a.asset_category, a.asset_name, a.cap_tags,
                 equip.map(e => e.equip_type + " " + (e.equip_id||"")).join(" ")].join(" ").toLowerCase();
    return {attrs:a, geom:f.geometry, clocks, worst, equip, cap,
            color: a.asset_status === "deployed" ? COLORS.deployed : COLORS[worst ? worst.sched_status : "none"]};
  });
  assets.sort((x,y) => (SEVERITY[x.worst?.sched_status]??9)-(SEVERITY[y.worst?.sched_status]??9)
                     || (x.worst?.due_date||9e15)-(y.worst?.due_date||9e15));
  byId = Object.fromEntries(assets.map(x => [x.attrs.equipment_id, x]));
  byGuid = Object.fromEntries(assets.map(x =>
    [String(x.attrs.GlobalID || "").replace(/[{}]/g, "").toLowerCase(), x]));

  gLayer = new GraphicsLayer();
  // Region tint under the status dots (US states only; colors from the BNSF map)
  let regionLayer = null;
  try {
    const hex2rgba = (h, a) => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16), a];
    regionLayer = new FeatureLayer({
      url: "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/USA_States_Generalized_Boundaries/FeatureServer/0",
      definitionExpression: `STATE_ABBR IN (${Object.keys(STATE_REGION).map(s=>`'${s}'`).join(",")})`,
      popupEnabled: false, legendEnabled: false,
      renderer: {type:"unique-value", field:"STATE_ABBR",
        uniqueValueInfos: Object.entries(STATE_REGION).map(([st, mgr]) => ({
          value: st,
          symbol: {type:"simple-fill", color: hex2rgba(REGION_COLORS[mgr], 0.22),
                   outline: {color:[255,255,255,0.12], width:0.5}}}))}
    });
  } catch(e){ console.warn("region overlay unavailable", e); }
  view = new MapView({
    container:"mapDiv", map:new Map({basemap:"dark-gray-vector",
      layers: regionLayer ? [regionLayer, gLayer] : [gLayer]}),
    center:[-105,44], zoom:4, popupEnabled:false,
    ui:{components:["zoom"]}
  });
  drawMarkers(assets);
  view.on("click", async ev => {
    if (nearMode){ nearPt = ev.mapPoint; nearMode=false; $("nearHint").textContent="Location set — ranking…"; runNearest(); return; }
    const hit = await view.hitTest(ev, {include:gLayer});
    const g = hit.results.find(r => r.graphic && r.graphic.attributes && r.graphic.attributes.eid);
    if (g) select(g.graphic.attributes.eid, false);
  });

  buildFilters();
  renderList(currentListItems());
  setTab("stats");   // land on the dashboard; Assets tab holds the list
  $("loader").style.display = "none";

  // QR / deep link: ?asset=<equipment_id> opens that asset directly
  const params = new URLSearchParams(location.search);
  const qp = params.get("asset");
  if (qp){
    const x = byId[qp.trim()] || byId[qp.trim().toUpperCase()];
    if (x){
      select(x.attrs.equipment_id, true);
      if (params.get("view") === "inventory") showInventory();  // QR: straight to inventory
    }
    else toast("Asset " + qp + " not found");
  }
}

// ---- attribute filters (built from whatever the data actually has) ----
const FILTER_DEFS = [
  ["hazmat_manager", "Region", v => REGION_LABEL[v] || v], ["contractor_name", "Contractor"],
  ["asset_type", "Type"], ["asset_status", "Status"],
  ["asset_category", "Category"],
];
const filterState = {};
// Per client 2026-07-20: legacy responders stay on assets but out of the filter
const FILTER_EXCLUDE = {contractor_name: new Set(["EWI",
  "PRAIRIE DU CHIEN FIRE DEPARTMENT", "SOUTH BOUNDARY FIRE PROTECTION DISTRICT"])};
function buildFilters(){
  const host = $("filters");
  host.innerHTML = "";
  FILTER_DEFS.forEach(([field, label, disp]) => {
    let vals = [...new Set(assets.map(x => x.attrs[field]).filter(Boolean))].sort();
    if (FILTER_EXCLUDE[field]) vals = vals.filter(v => !FILTER_EXCLUDE[field].has(v));
    if (!vals.length) return;  // e.g. hazmat_manager appears once data exists
    const sel = document.createElement("select");
    sel.id = "flt_" + field;
    sel.innerHTML = `<option value="">${label} (all)</option>` +
      vals.map(v => `<option value="${v}">${disp ? disp(v) : title(String(v))}</option>`).join("");
    sel.onchange = () => {
      filterState[field] = sel.value || null;
      sel.classList.toggle("on", !!sel.value);
      renderList(currentListItems());
    };
    host.appendChild(sel);
  });
  const cnt = document.createElement("div");
  cnt.id = "fltCount";
  host.appendChild(cnt);
}

function drawMarkers(items){
  gLayer.removeAll();
  if (window._nearMarker) gLayer.add(window._nearMarker);
  items.forEach(x => {
    if (!x.geom) return;
    gLayer.add(new Graphic({
      geometry: x.geom, attributes: {eid: x.attrs.equipment_id},
      symbol: {type:"simple-marker", color:x.color, size:9,
               outline:{color: selected===x.attrs.equipment_id ? "#fff" : "#0a0c10", width:1.4}}
    }));
  });
}

function badge(st){ return `<span class="badge" style="background:${COLORS[st]||COLORS.none};color:#0a0c10">${title(st||"no clocks")}</span>`; }

function renderList(items){
  $("list").innerHTML = items.map(x => {
    const a = x.attrs, w = x.worst;
    return `<div class="row ${selected===a.equipment_id?"sel":""}" data-eid="${a.equipment_id}">
      <span class="dot" style="background:${x.color}"></span>
      <div><div class="t">${a.equipment_id}</div><div class="s">${title(a.asset_type)} · ${(a.current_warehouse||a.staging_desc||"").split(" - ").pop()||""}</div></div>
      <div class="due">${w ? tlabel(w.sched_type)+"<br>"+fmtDate(w.due_date) : "no clocks"}</div>

    ["VIN",a.vin],["Plate",[a.plate_number,a.plate_state].filter(Boolean).join(" ")],
    ["Tire year",a.tire_mfg_year],["GPS #",a.gps_tracking_num],["Holman",a.holman_no]];

  }).join("") : "<div style='color:var(--text-muted);font-size:13px'>None linked (see parent-inference review)</div>";
  // Only offer the audits this asset's schedules actually call for (e.g. capping
  // kits get Audit Inventory but never DOT); category is the no-clock fallback
  const hasClock = t => x.clocks.some(c => c.sched_type === t);
  const showDOT = hasClock("dot_inspection") || hasClock("bit_inspection")
    || (!x.clocks.length && a.asset_category === "trailer");

    || (!x.clocks.length && ["trailer","kit","container","cache","railcar"].includes(a.asset_category));

function openOverlay(title, opts){
  $("oTitle").textContent = title;
  const fr = $("oFrame"), bd = $("oBody");
  if (opts.url){
    fr.style.display = "block"; bd.style.display = "none";
    fr.src = opts.url;
    $("oExt").href = opts.url; $("oExt").style.display = "inline";
  } else {
    fr.style.display = "none"; bd.style.display = "block";
    bd.innerHTML = opts.html || "";

  }

    history.pushState({wriOverlay: true}, "");

  $("oBody").innerHTML = "";

}

function openSurvey(kind, extra){

  const form = (ASSET_SURVEYS[a.equipment_id] || {})[kind] || SURVEYS[kind];
  if (!form) return toast("No " + (SURVEY_TITLES[kind]||kind) + " form for this asset");

    `field:asset_guid=${encodeURIComponent("{"+guid+"}")}` +
    `&field:asset_equipment_id=${encodeURIComponent(a.equipment_id)}`;
  if (kind === "details")  // identity-confirm prefills
    extra = Object.assign({f_warehouse:a.current_warehouse, f_address:a.staging_desc,
      f_plate:[a.plate_number,a.plate_state].filter(Boolean).join(" "),
      f_vin:a.vin, f_tire:a.tire_mfg_year}, extra);
  for (const [k, v] of Object.entries(extra || {}))
    if (v != null && v !== "") url += `&field:${k}=${encodeURIComponent(v)}`;

// ---- up-to-date inventory: baseline overlaid with the latest count's adjustments
async function showInventory(){
  const x = byId[selected]; if (!x) return;
  const a = x.attrs;
  const guid = String(a.GlobalID).replace(/[{}]/g,"");
  openOverlay("Inventory — " + a.equipment_id,
              {html:"<div style='color:var(--text-dim)'>Loading…</div>"});
  try {
    const [baseFs, inspFs] = await Promise.all([
      layers.baseline.queryFeatures({where:`asset_guid='{${guid}}'`,
        outFields:["item_category","item_desc","item_code","expected_qty"],
        orderByFields:["OBJECTID"], num:2000}),  // workbook order = survey order
      layers.insp.queryFeatures({where:`asset_guid='{${guid}}' AND insp_type='audit_inventory'`,
        outFields:["GlobalID","insp_date","inspector_name"],
        orderByFields:["insp_date DESC"], num:1}),
    ]);
    const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");
    const adj = {};
    let lastCount = null;
    if (inspFs.features.length){
      lastCount = inspFs.features[0].attributes;
      const ig = String(lastCount.GlobalID).replace(/[{}]/g,"");
      const cFs = await layers.counts.queryFeatures({where:`parentglobalid='{${ig}}'`,
        outFields:["item_desc","item_code","counted_qty","item_condition","replace_needed","count_notes"],
        num:2000});
      cFs.features.forEach(f => { const c = f.attributes;
        const k = String(c.item_code || c.item_desc || "").trim().toLowerCase();
        if (k) adj[k] = c;
      });
    }
    let rows = "", lastCat = null, flagged = 0;
    baseFs.features.forEach(f => { const b = f.attributes;
      const c = adj[String(b.item_code||"").trim().toLowerCase()]
             || adj[String(b.item_desc||"").trim().toLowerCase()];
      const cat = catLabel(b.item_category);
      if (cat !== lastCat){
        rows += `<div class="invcat">${esc(cat)}</div>`;
        lastCat = cat;
      }
      const short = c && c.counted_qty != null && c.counted_qty < b.expected_qty;
      const condBad = c && c.item_condition && c.item_condition !== "good";
      if (short || condBad) flagged++;
      rows += `<div class="invrow${short||condBad ? " bad" : ""}">
        <div>${esc(b.item_desc)}
          ${condBad ? `<div class="invn">${title(c.item_condition)}${c.replace_needed==="yes"?" · needs replacement":""}</div>` : ""}
          ${c && c.count_notes ? `<div class="invn">${esc(c.count_notes)}</div>` : ""}</div>
        <div class="invq">${(c && c.counted_qty != null ? c.counted_qty : b.expected_qty) ?? "—"}${short ? ` <span class="invx">of ${b.expected_qty}</span>` : ""}</div>
      </div>`;
    });
    const hdr = `<div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">
      ${baseFs.features.length} line items
      ${lastCount ? ` · adjusted by count ${fmtDate(lastCount.insp_date)}${lastCount.inspector_name?" ("+esc(lastCount.inspector_name)+")":""}` : " · baseline only — no counts recorded yet"}
      ${flagged ? ` · <b style="color:var(--warn)">${flagged} flagged</b>` : ""}</div>`;
    $("oBody").innerHTML = baseFs.features.length ? hdr + rows
      : "No baseline inventory on file — run an Audit Inventory count to establish one.";
  } catch(e){ console.error(e); $("oBody").innerHTML = "Inventory unavailable: " + (e.message||e); }
}

// ================= Guided Full Audit =================
// Flow (client 2026-07-21): equipment maintenance -> asset details + paged
// inventory walk -> deficiencies. Ticks are today's submissions; the guide
// runs the audit-processor rules live so criticals/clock react same-day.
const g8s = s => String(s||"").replace(/[{}]/g,"").toLowerCase().slice(0,8);
const verdictBadge = r =>
  r === "pass" ? `<b style="color:var(--ok)">PASS</b>` :
  r === "pass_with_issues" ? `<b style="color:var(--warn)">PASS — with issues</b>` :
  r === "fail" ? `<b style="color:var(--bad)">FAIL — critical deficiencies</b>` : esc(r||"");

window.openGuideRefresh = () => { const x = byId[selected]; if (x) {
  $("oBody").innerHTML = "<div style='color:var(--text-dim)'>Refreshing…</div>";

    $("oBody").innerHTML = "Audit guide unavailable: " + (e.message||e); }); } };

async function renderGuide(x){
  const a = x.attrs;
  const aguid = String(a.GlobalID).replace(/[{}]/g,"");
  try { await processAssetAudit(x); } catch(e){ console.warn("live processing skipped:", e); }
  const t0 = new Date(); t0.setHours(0,0,0,0);
  const eqG = x.equip.map(e => "'{"+String(e.GlobalID).replace(/[{}]/g,"")+"}'");
  const [audFs, issFs, mFs] = await Promise.all([
    layers.insp.queryFeatures({where:`asset_guid='{${aguid}}' AND insp_type IN ('audit_inventory','asset_detail_check')`,
      outFields:["GlobalID","insp_date","insp_result","inspector_name","insp_type"],
      orderByFields:["insp_date DESC"], num:20}),
    layers.issues.queryFeatures({where:`asset_guid='{${aguid}}' AND issue_status IN ('open','in_progress') AND source_type='audit'`,
      outFields:["issue_severity","issue_desc","parts_needed"], num:200}),
    eqG.length ? layers.maint.queryFeatures({where:`equip_guid IN (${eqG.join(",")})`,
      outFields:["equip_guid","event_date"], orderByFields:["event_date DESC"], num:100})
      : Promise.resolve({features:[]}),
  ]);
  const doneToday = new Set(mFs.features.filter(f => (f.attributes.event_date||0) >= +t0)
                                        .map(f => g8s(f.attributes.equip_guid)));
  const insps = audFs.features.map(f => f.attributes);
  const latest = insps.find(i => i.insp_type === "audit_inventory");
  const auditToday = latest && (latest.insp_date||0) >= +t0;
  const lastDetails = insps.find(i => i.insp_type === "asset_detail_check");
  const detailsToday = lastDetails && (lastDetails.insp_date||0) >= +t0;
  const issuesList = issFs.features.map(f => f.attributes);
  const crit = issuesList.filter(i => i.issue_severity === "critical");
  const rest = issuesList.filter(i => i.issue_severity !== "critical");
  const itemIssues = issuesList.filter(i => /\[item /.test(i.issue_desc));
  const tick = ok => `<span style="font-weight:800;font-size:16px;color:${ok?"var(--ok)":"var(--text-muted)"}">${ok?"✓":"○"}</span>`;
  const step = (ok, label, sub, btn) =>
    `<div class="clock" style="gap:10px">${tick(ok)}<div class="cn">${label}${sub?`<div class="cd">${sub}</div>`:""}</div>${btn||""}</div>`;
  const lbtn = fn => `<button class="btn red" style="flex:none;padding:8px 14px;font-size:12.5px" onclick="${fn}">Open</button>`;
  const cat = t => `<div class="invcat">${t}</div>`;
  const issRow = (i, color) => `<div class="clock"><span class="dot" style="background:${color};flex:none"></span>
    <div class="cn">${esc(stripTags(i.issue_desc))}</div></div>`;

  let html = `<div style="font-size:12.5px;color:var(--text-dim);margin-bottom:10px">
    Work top to bottom. After submitting a form, tap <b>&#8592; Back</b> and reopen
    the audit — status refreshes automatically.</div>`;
  html += cat("Step 1 — Asset details");
  html += step(!!detailsToday, "Confirm trailer ID, location, license, VIN",
    lastDetails ? `last confirmed ${fmtDate(lastDetails.insp_date)}` : "never confirmed",
    lbtn("openSurvey('details')"));
  html += cat("Step 2 — Equipment maintenance");
  html += x.equip.length ? x.equip.map(e => {
    const kind = maintKind(e.equip_type);
    return step(doneToday.has(g8s(e.GlobalID)),
      `${SURVEY_TITLES[kind]} — ${esc(e.equip_id)}`,
      kind === "hpp" ? "includes the skimmer function test" : null,
      lbtn(`openMaint('${kind}','${String(e.GlobalID).replace(/[{}]/g,"")}','${(e.equip_id||"").replace(/'/g,"")}')`));
  }).join("") : `<div class="cd" style="padding:4px 0 8px">No powered equipment linked — go straight to the walk.</div>`;
  html += cat("Step 3 — Inventory walk");
  html += step(!!auditToday, "Walk back &#8594; front (paged survey)",
    latest ? `last audit ${fmtDate(latest.insp_date)} — ${verdictBadge(latest.insp_result)}` : "never audited",
    lbtn("openSurvey('audit')"));
  html += cat(`Deficiencies (${issuesList.length} open)`);
  if (!issuesList.length){
    html += `<div class="cd" style="padding:4px 0">${latest
      ? `None open — <b style="color:var(--ok)">trailer is audit-complete.</b>`
      : "Run the audit to establish status."}</div>`;
  } else {
    html += crit.map(i => issRow(i, "var(--bad)")).join("")
          + rest.map(i => issRow(i, "var(--warn)")).join("");
    if (itemIssues.length && (ASSET_SURVEYS[a.equipment_id]||{}).resolve)
      html += `<div style="margin-top:10px"><button class="btn red" style="width:100%"
        onclick="launchResolve()">Resolve deficiencies (${itemIssues.length} item${itemIssues.length>1?"s":""}) &#8594;</button></div>`;
    if (crit.some(i => /\[maint /.test(i.issue_desc)))
      html += `<div class="cd" style="margin-top:8px">Equipment failures clear when that
        unit's maintenance form is re-run with every task passing.</div>`;
  }
  html += `<div style="margin-top:14px"><button class="btn gray" style="width:100%"
    onclick="openGuideRefresh()">&#8635; Refresh status</button></div>`;
  $("oBody").innerHTML = html;
}

window.launchResolve = async () => {
  const x = byId[selected]; if (!x) return;
  const aguid = String(x.attrs.GlobalID).replace(/[{}]/g,"");
  try {
    const [baseFs, issFs] = await Promise.all([
      layers.baseline.queryFeatures({where:`asset_guid='{${aguid}}'`,
        outFields:["item_code"], orderByFields:["OBJECTID"], num:2000}),
      layers.issues.queryFeatures({where:`asset_guid='{${aguid}}' AND issue_status IN ('open','in_progress') AND source_type='audit'`,
        outFields:["issue_desc"], num:200}),
    ]);
    const codeIdx = {};
    baseFs.features.forEach((f, i) => codeIdx[f.attributes.item_code] = i + 1);
    const idxs = new Set();
    issFs.features.forEach(f => {
      const m = f.attributes.issue_desc.match(/\[item ([^\]]+)\]/);
      if (m && codeIdx[m[1]]) idxs.add(codeIdx[m[1]]);
    });
    if (!idxs.size) return toast("No open item deficiencies to resolve");
    openSurvey("resolve", {resolve_items: [...idxs].sort((p,q)=>p-q).join(",")});
  } catch(e){ console.error(e); toast("Resolve launch failed: " + (e.message||e)); }
};

// live mirror of ops/audit_processor.py, scoped to one asset — keeps
// criticals, notes and the audit clock honest the same day forms come in
async function processAssetAudit(x){
  const a = x.attrs;
  if (!(ASSET_SURVEYS[a.equipment_id]||{}).audit) return;
  const aguid = String(a.GlobalID).replace(/[{}]/g,"");
  const allIssFs = await layers.issues.queryFeatures({
    where:`asset_guid='{${aguid}}' AND source_type='audit'`,
    outFields:["OBJECTID","issue_severity","issue_desc","issue_status"], num:1000});
  const allIss = allIssFs.features.map(f => f.attributes);
  const tags = new Set();
  allIss.forEach(i => (i.issue_desc.match(/\[(audit|maint) [0-9a-f]{8}\]/g)||[]).forEach(t => tags.add(t)));
  const adds = [], closes = [];

  // 1. audits -> issues
  const audFs = await layers.insp.queryFeatures({
    where:`asset_guid='{${aguid}}' AND insp_type='audit_inventory' AND app_version='s123-audit-v2'`,
    outFields:["GlobalID","insp_result","insp_date","inspector_name"],
    orderByFields:["insp_date DESC"], num:10});
  for (const f of audFs.features){
    const ins = f.attributes;
    if (ins.insp_result !== "fail" && ins.insp_result !== "pass_with_issues") continue;
    const tag = `[audit ${g8s(ins.GlobalID)}]`;
    if (tags.has(tag)) continue;
    const kids = await layers.counts.queryFeatures({
      where:`parentglobalid='{${String(ins.GlobalID).replace(/[{}]/g,"")}}'`,
      outFields:["item_code","item_desc","expected_qty","counted_qty","shortage_qty","count_notes"], num:500});
    kids.features.forEach(kf => { const k = kf.attributes;
      const critFlag = String(k.count_notes||"").startsWith("[CRITICAL]");
      const note = String(k.count_notes||"").replace("[CRITICAL] ","").trim();
      adds.push({attributes:{asset_guid:a.GlobalID, asset_equipment_id:a.equipment_id,
        issue_status:"open", issue_severity: critFlag ? "critical" : "minor",
        issue_desc: `${critFlag?"[CRITICAL] ":""}${k.item_desc}: counted ${k.counted_qty} of ${k.expected_qty}${note?" — "+note:""} [item ${k.item_code}] ${tag}`.slice(0,1000),
        parts_needed: `${k.item_desc} x ${k.shortage_qty}`.slice(0,500),
        reported_by: ins.inspector_name, reported_date: ins.insp_date,
        source_type:"audit", app_version:"viewer-live"}});
    });
  }

  // 2. failed maintenance tasks -> critical issues
  const eqG = x.equip.map(e => "'{"+String(e.GlobalID).replace(/[{}]/g,"")+"}'");
  let events = [];
  if (eqG.length){
    const mFs = await layers.maint.queryFeatures({
      where:`equip_guid IN (${eqG.join(",")}) AND app_version LIKE 's123%'`,
      outFields:["GlobalID","equip_guid","equip_id","event_date","performed_by"],
      orderByFields:["event_date DESC"], num:100});
    events = mFs.features.map(f => f.attributes);
  }
  const evFailed = {};
  if (events.length){
    const evG = events.map(e => "'{"+String(e.GlobalID).replace(/[{}]/g,"")+"}'");
    const tFs = await layers.mtasks.queryFeatures({
      where:`task_status='failed' AND parentglobalid IN (${evG.join(",")})`,
      outFields:["parentglobalid","task_desc"], num:500});
    tFs.features.forEach(f => { const k = g8s(f.attributes.parentglobalid);
      (evFailed[k] = evFailed[k]||[]).push(String(f.attributes.task_desc||"task").split(":")[0]); });
  }
  events.forEach(e => {
    const t8 = g8s(e.GlobalID), fails = evFailed[t8], tag = `[maint ${t8}]`;
    if (!fails || tags.has(tag)) return;
    adds.push({attributes:{asset_guid:a.GlobalID, asset_equipment_id:a.equipment_id,
      issue_status:"open", issue_severity:"critical",
      issue_desc:`[CRITICAL] Equipment failure — ${e.equip_id}: ${fails.join("; ")} ${tag}`.slice(0,1000),
      reported_by:e.performed_by, reported_date:e.event_date,
      source_type:"audit", app_version:"viewer-live"}});
  });

  // 3. resolutions close matching item issues
  const resFs = await layers.insp.queryFeatures({
    where:`asset_guid='{${aguid}}' AND insp_type='audit_resolution'`,
    outFields:["GlobalID"], num:20});
  const resolvedCodes = new Set();
  for (const f of resFs.features){
    const kids = await layers.counts.queryFeatures({
      where:`parentglobalid='{${String(f.attributes.GlobalID).replace(/[{}]/g,"")}}'`,
      outFields:["item_code","count_notes"], num:500});
    kids.features.forEach(kf => {
      if (String(kf.attributes.count_notes||"").startsWith("resolution:yes"))
        resolvedCodes.add(kf.attributes.item_code); });
  }
  const isOpen = i => i.issue_status === "open" || i.issue_status === "in_progress";
  allIss.filter(isOpen).forEach(i => {
    for (const c of resolvedCodes)
      if (i.issue_desc.includes(`[item ${c}]`)){
        closes.push({attributes:{OBJECTID:i.OBJECTID, issue_status:"resolved"}});
        i.issue_status = "resolved"; return;
      }
  });

  // 4. clean maintenance re-run closes that unit's failure issues
  const lastClean = {};
  events.forEach(e => { if (!evFailed[g8s(e.GlobalID)]){
    const k = g8s(e.equip_guid);
    lastClean[k] = Math.max(lastClean[k]||0, e.event_date||0); } });
  allIss.filter(isOpen).forEach(i => {
    const m = i.issue_desc.match(/\[maint ([0-9a-f]{8})\]/); if (!m) return;
    const src = events.find(e => g8s(e.GlobalID) === m[1]); if (!src) return;
    if ((lastClean[g8s(src.equip_guid)]||0) > (src.event_date||0)){
      closes.push({attributes:{OBJECTID:i.OBJECTID, issue_status:"resolved"}});
      i.issue_status = "resolved";
    }
  });
  if (adds.length || closes.length)
    await layers.issues.applyEdits({addFeatures:adds, updateFeatures:closes});

  // 5. clock: red until no critical remains, then advance once per audit
  const latest = audFs.features[0] && audFs.features[0].attributes;
  if (latest){
    const critOpen = allIss.some(i => isOpen(i) && i.issue_severity === "critical")
      || adds.some(ad => ad.attributes.issue_severity === "critical");
    const clock = x.clocks.find(c => c.sched_type === "audit_inventory" && !c._via);
    if (!critOpen && clock && g8s(clock.completed_by_guid) !== g8s(latest.GlobalID)){
      const months = clock.interval_months || 12;
      const due = (latest.insp_date || Date.now()) + months * 30.44 * 86400000;
      const days = (due - Date.now()) / 86400000;
      const status = days < 0 ? "overdue" : (days <= 90 ? "due_soon" : "current");
      await layers.sched.applyEdits({updateFeatures:[{attributes:{
        OBJECTID: clock.OBJECTID, last_completed: latest.insp_date,
        due_date: Math.round(due), completed_by_guid: latest.GlobalID,
        sched_status: status}}]});
      clock.last_completed = latest.insp_date; clock.due_date = Math.round(due);
      clock.completed_by_guid = latest.GlobalID; clock.sched_status = status;
      x.clocks.sort((p,q) => (SEVERITY[p.sched_status]??9)-(SEVERITY[q.sched_status]??9)
                          || (p.due_date||9e15)-(q.due_date||9e15));
      x.worst = x.clocks[0];
      x.color = a.asset_status === "deployed" ? COLORS.deployed
              : COLORS[x.worst ? x.worst.sched_status : "none"];
      drawMarkers(currentListItems());
    }
  }
  if (selected === a.equipment_id) select(a.equipment_id, false);  // refresh detail
}

async function loadHistory(x){
  const host = $("dHist");
  host.textContent = "Loading…";
  try {
    const guid = String(x.attrs.GlobalID).replace(/[{}]/g,"");
    const events = [];
    const inspFs = await layers.insp.queryFeatures({where:`asset_guid='{${guid}}'`,
        outFields:["insp_type","insp_status","insp_date","inspector_name","insp_notes"],
        orderByFields:["insp_date DESC"], num:200});
    inspFs.features.forEach(f => { const a=f.attributes;
      const lbl = tlabel(a.insp_type);
      events.push({when:a.insp_date, label:(a.insp_type==="other"&&a.insp_notes&&a.insp_notes.includes("(migrated")?a.insp_notes.replace(" (migrated from platform)",""):lbl),
                   who:a.inspector_name, issues:a.insp_status==="completed_issues", kind:"Inspection"});
    });
    const eqGuids = x.equip.map(e => "'{"+String(e.GlobalID).replace(/[{}]/g,"")+"}'");
    const eqKind = Object.fromEntries(x.equip.map(e => [e.equip_id, SURVEY_TITLES[maintKind(e.equip_type)]]));
    if (eqGuids.length){
      const mFs = await layers.maint.queryFeatures({
        where:`equip_guid IN (${eqGuids.join(",")})`,
        outFields:["equip_id","event_date","performed_by","maint_status","event_notes"],
        orderByFields:["event_date DESC"], num:200});
      mFs.features.forEach(f => { const a=f.attributes;
        events.push({when:a.event_date, label:(eqKind[a.equip_id]||"Equipment Maint")+" — "+a.equip_id,
                     who:a.performed_by, issues:a.maint_status==="completed_issues", kind:"Maintenance"});
      });
    }
    events.sort((p,q) => (q.when||0)-(p.when||0));
    host.innerHTML = events.length ? events.slice(0,40).map(e =>
      `<div class="clock"><div class="cn">${e.label}${e.issues?' <span class="badge" style="background:var(--warn);color:#0a0c10">issues</span>':""}
       ${e.who?`<div class="cd">${e.who}</div>`:""}</div><div class="cd">${fmtDate(e.when)}</div></div>`).join("")
      + (events.length>40?`<div class="cd" style="padding-top:6px">…and ${events.length-40} older records</div>`:"")
      : "No history on record";
  } catch(err){ console.error(err); host.textContent = "History unavailable: " + (err.message||err); }
}

// ---- Notes & what to bring: open issues split critical / bring-next-time ----
const stripTags = d => String(d||"").replace(/\s*\[(item|audit|maint)[^\]]*\]/g,"").replace(/^\[CRITICAL\]\s*/,"");
async function loadBring(x){
  const host = $("dNotes");
  const notes = x.attrs.asset_notes;
  host.innerHTML = notes ? esc(notes) : "—";
  try {
    const guid = String(x.attrs.GlobalID).replace(/[{}]/g,"");
    const fs = await layers.issues.queryFeatures({
      where:`asset_guid='{${guid}}' AND issue_status IN ('open','in_progress')`,
      outFields:["issue_severity","issue_desc","parts_needed"], num:200});
    if (x.attrs.equipment_id !== selected) return;  // user moved on mid-query
    const items = fs.features.map(f => f.attributes);
    const crit = items.filter(i => i.issue_severity === "critical");
    const rest = items.filter(i => i.issue_severity !== "critical");
    const hdr = (txt, color) => `<div style="font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:${color};font-weight:800;margin:8px 0 4px">${txt}</div>`;
    const row = (i, color) => `<div class="clock"><div class="cn">${esc(stripTags(i.issue_desc))}
      ${i.parts_needed ? `<div class="cd"><b style="color:${color}">Bring:</b> ${esc(i.parts_needed)}</div>` : ""}</div>
      <div class="cd">${title(i.issue_severity)}</div></div>`;
    let html = notes ? `<div style="margin-bottom:8px">${esc(notes)}</div>` : "";
    if (crit.length)
      html += hdr("Critical — resolve urgently", "var(--bad)") + crit.map(i => row(i, "var(--bad)")).join("");
    if (rest.length)
      html += hdr("What to bring next time", "var(--warn)") + rest.map(i => row(i, "var(--warn)")).join("");
    if (!items.length)
      html += hdr("What to bring next time", "var(--warn)") +
        `<div style="color:var(--text-muted)">No open issues — nothing extra to bring.</div>`;
    host.innerHTML = html;
    const chip = $("dAuditChip");
    if (chip) chip.remove();
    if (crit.length) $("dSub").insertAdjacentHTML("beforeend",
      ` <span class="badge" id="dAuditChip" style="background:var(--bad);color:#fff">CRITICAL ITEMS OPEN</span>`);
  } catch(e){ console.error(e); }
}

function buildStats(){
  const regionOf = x => x.attrs.hazmat_manager || "Unassigned";
  const worstOf = x => { const s = x.worst ? x.worst.sched_status : "none";
                         return (s in COLORS && s !== "deployed") ? s : "none"; };
  const inRegion = x => !statsRegion || regionOf(x) === statsRegion;
  // tiles reflect the drilled region; bars stay fleet-wide with the pick highlighted
  const scope = assets.filter(inRegion);
  const c = {overdue:0, due_soon:0, current:0, none:0, deployed:0};
  scope.forEach(x => { c[worstOf(x)]++; if (x.attrs.asset_status === "deployed") c.deployed++; });
  const issuesInScope = Array.isArray(openIssues)
    ? openIssues.filter(i => { const x = byGuid[i.g]; return x && inRegion(x); }) : null;
  const issueN = issuesInScope ? issuesInScope.length : "…";

  const regions = {};
  assets.forEach(x => {
    const r = regionOf(x);
    const g = regions[r] = regions[r] || {overdue:0, due_soon:0, current:0, none:0, total:0};
    g[worstOf(x)]++; g.total++;
  });
  const regionKeys = [...REGION_ORDER.filter(r => regions[r]),
                      ...Object.keys(regions).filter(r => !REGION_ORDER.includes(r)).sort()];
  const maxTotal = Math.max(...regionKeys.map(r => regions[r].total), 1);

  const tile = (key, label, val, color) =>
    `<div class="tile click${statsDrill===key?" on":""}" data-drill="${key}">
     <div class="tl"><span class="dot" style="background:${color}"></span>${label}</div>
     <div class="tv">${val}</div></div>`;
  const SEGS = [["overdue","Overdue"],["due_soon","Due ≤ 90 days"],["current","Current"],["none","No clocks"]];
  const rows = regionKeys.map(r => {
    const g = regions[r];
    const segs = SEGS.filter(([k]) => g[k] > 0);
    const bars = segs.map(([k, lbl], i) =>
      `<div class="seg" data-r="${r}" data-lbl="${lbl}" data-n="${g[k]}"
        style="width:${(g[k] / maxTotal * 100).toFixed(2)}%;background:${COLORS[k]};
        ${i === segs.length - 1 ? "border-radius:0 4px 4px 0" : ""}"></div>`).join("");
    return `<div class="rrow" data-r="${r}" style="cursor:pointer;opacity:${statsRegion && statsRegion !== r ? ".4" : "1"}">
            <div class="rl"><span><span class="dot" style="background:${REGION_COLORS[r]||"#666"};display:inline-block;margin-right:5px"></span>${REGION_LABEL[r] || r}</span><b>${g.total}</b></div>
            <div class="rbar">${bars || ""}</div></div>`;
  }).join("");

  const chip = statsRegion
    ? `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:10px;font-size:12.5px">
        <span><span class="dot" style="background:${REGION_COLORS[statsRegion]||"#666"};display:inline-block;margin-right:5px"></span><b>${REGION_LABEL[statsRegion] || statsRegion}</b></span>
        <a href="#" id="statsClear" style="color:var(--deployed);font-weight:600">Show all regions</a>
        <a href="#" id="statsToList" style="color:var(--deployed);font-weight:600">Open in Assets list →</a></div>`
    : "";

  // tile drill-down: the matching assets (or issues) listed inline, region-scoped
  let drill = "";
  if (statsDrill){
    const DRILL_LABEL = {all:"All assets", deployed:"Deployed to incident", overdue:"Service overdue",
                         due_soon:"Due ≤ 90 days", current:"Current", issues:"Open issues"};
    let drillRows;
    if (statsDrill === "issues"){
      drillRows = (issuesInScope || []).map(i => { const x = byGuid[i.g];
        return `<div class="row" data-eid="${x.attrs.equipment_id}">
          <span class="dot" style="background:var(--warn)"></span>
          <div><div class="t">${x.attrs.equipment_id}</div><div class="s">${esc(i.desc)}</div></div>
          <div class="due">${title(i.sev)}</div></div>`; }).join("");
    } else {
      const match = x => statsDrill === "all" ? true
        : statsDrill === "deployed" ? x.attrs.asset_status === "deployed"
        : worstOf(x) === statsDrill;
      drillRows = scope.filter(match).map(x => { const a = x.attrs, w = x.worst;
        return `<div class="row" data-eid="${a.equipment_id}">
          <span class="dot" style="background:${x.color}"></span>
          <div><div class="t">${a.equipment_id}</div><div class="s">${title(a.asset_type)} · ${(a.current_warehouse||a.staging_desc||"").split(" - ").pop()||""}</div></div>
          <div class="due">${w ? tlabel(w.sched_type)+"<br>"+fmtDate(w.due_date) : "no clocks"}</div></div>`; }).join("");
    }
    drill = `<div style="display:flex;align-items:center;gap:10px;margin:2px 0 6px">
      <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)">${DRILL_LABEL[statsDrill]}${statsRegion ? " — " + (REGION_LABEL[statsRegion]||statsRegion) : ""}</div>
      <a href="#" id="drillClear" style="color:var(--deployed);font-size:12px;font-weight:600">Close ×</a></div>
      <div style="margin:0 -12px 14px;border-top:1px solid var(--border)">${drillRows
        || "<div style='color:var(--text-muted);font-size:13px;padding:8px 12px'>None</div>"}</div>`;
  }

  $("statsPanel").innerHTML =
    `${chip}<div class="tiles">
      ${tile("all", statsRegion ? "Assets in region" : "Assets tracked", scope.length, "var(--text-muted)")}
      ${tile("deployed", "Deployed to incident", c.deployed, COLORS.deployed)}
      ${tile("overdue", "Service overdue", c.overdue, COLORS.overdue)}
      ${tile("due_soon", "Due ≤ 90 days", c.due_soon, COLORS.due_soon)}
      ${tile("current", "Current", c.current, COLORS.current)}
      ${tile("issues", "Open issues", issueN, "var(--warn)")}
    </div>
    ${drill}
    <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px">Status by region</div>
    <div class="legend">${SEGS.map(([k,l]) => `<span><span class="dot" style="background:${COLORS[k]}"></span>${l}</span>`).join("")}</div>
    <div class="rchart">${rows}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px">Worst clock per asset · statuses recomputed nightly · tap a card or region to drill in</div>
    <div style="margin-top:12px"><a href="#" id="statsInstr" style="color:var(--deployed);font-size:12.5px;font-weight:600">Inspection &amp; maintenance instructions →</a></div>`;

  $("statsInstr").onclick = e => { e.preventDefault();
    openOverlay("Inspection & Maintenance Instructions", {url:"instructions.html"}); };
  $("statsPanel").querySelectorAll(".tile.click").forEach(t =>
    t.onclick = () => { statsDrill = statsDrill === t.dataset.drill ? null : t.dataset.drill; buildStats(); });
  const dc = $("drillClear");
  if (dc) dc.onclick = e => { e.preventDefault(); statsDrill = null; buildStats(); };
  $("statsPanel").querySelectorAll(".row[data-eid]").forEach(r =>
    r.onclick = () => select(r.dataset.eid, true));
  if (statsRegion){
    $("statsClear").onclick = e => { e.preventDefault(); statsRegion = null; buildStats(); };
    $("statsToList").onclick = e => { e.preventDefault();
      const sel = $("flt_hazmat_manager");
      const val = statsRegion === "Unassigned" ? "" : statsRegion;
      filterState.hazmat_manager = val || null;
      if (sel){ sel.value = val; sel.classList.toggle("on", !!val); }
      setTab("list"); renderList(currentListItems());
    };
  }
  const tip = $("chartTip");
  $("statsPanel").querySelectorAll(".seg").forEach(s => {
    s.onmousemove = e => { tip.style.display = "block"; tip.style.left = (e.clientX + 12) + "px";
      tip.style.top = (e.clientY + 12) + "px";
      tip.textContent = `${s.dataset.lbl}: ${s.dataset.n} — ${REGION_LABEL[s.dataset.r] || s.dataset.r}`; };
    s.onmouseleave = () => tip.style.display = "none";
  });
  $("statsPanel").querySelectorAll(".rrow").forEach(r => {
    r.onclick = () => { tip.style.display = "none";
      statsRegion = statsRegion === r.dataset.r ? null : r.dataset.r;
      buildStats();
    };
  });

  if (openIssues === null){
    openIssues = "pending";
    layers.issues.queryFeatures({where:"issue_status IN ('open','in_progress')",
        outFields:["asset_guid","issue_severity","issue_desc"], num:2000})
      .then(fs => { openIssues = fs.features.map(f => ({
          g: String(f.attributes.asset_guid||"").replace(/[{}]/g,"").toLowerCase(),
          sev: f.attributes.issue_severity, desc: f.attributes.issue_desc})); })
      .catch(() => { openIssues = []; })
      .then(() => { if ($("statsPanel").classList.contains("active")) buildStats(); });
  }
}

// ---- WRI internal tools toggle (Find Nearest + Mobilize hidden for BNSF users) ----
if (localStorage.getItem("wri_tools") === "1") document.body.classList.add("wri-tools");
$("wriToggle").onclick = () => {
  const on = document.body.classList.toggle("wri-tools");
  localStorage.setItem("wri_tools", on ? "1" : "0");
  if (!on && $("nearPanel").classList.contains("active")) setTab("list");
  toast("WRI tools " + (on ? "shown" : "hidden"));
};

// ---- Find Nearest ----
const R = 3958.8;
function distMi(lat1,lon1,lat2,lon2){
  const dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
$("nearGPS").onclick = () => navigator.geolocation.getCurrentPosition(
  p => { nearPt = new Point({latitude:p.coords.latitude, longitude:p.coords.longitude}); $("nearHint").textContent="Location set — ranking…"; runNearest(); },
  () => toast("Location unavailable — click the map instead"));
$("nearClick").onclick = () => { nearMode = true; $("nearHint").textContent="Now click the incident location on the map…"; if(window.innerWidth<=760) hidePanel(); };
$("nearTerm").oninput = runNearest;
$("nearAll").onchange = runNearest;
$("nearClear").onclick = () => {
  nearPt = null; nearMode = false;
  if (window._nearMarker){ gLayer.remove(window._nearMarker); window._nearMarker = null; }
  $("nearResults").innerHTML = "";
  $("nearHint").textContent = "Pick a location, then results rank by straight-line distance.";
};

function runNearest(){
  if (!nearPt) return;
  const term = $("nearTerm").value.trim().toLowerCase();
  const inclAll = $("nearAll").checked;
  let cands = assets.filter(x => x.geom);
  if (!inclAll) cands = cands.filter(x => x.attrs.asset_status === "available");
  if (term) cands = cands.filter(x => x.cap.includes(term));
  cands = cands.map(x => ({x, d: distMi(nearPt.latitude, nearPt.longitude, x.geom.latitude, x.geom.longitude)}))
               .sort((a,b) => a.d-b.d).slice(0,12);
  $("nearHint").textContent = cands.length ? "Straight-line distance — verify road access." : "No matching available assets.";
  $("nearResults").innerHTML = cands.map(({x,d}) =>
    `<div class="nrow" data-eid="${x.attrs.equipment_id}">
      <span class="d">${d.toFixed(0)} mi</span> · <b>${x.attrs.equipment_id}</b> ${x.attrs.asset_status!=="available"?badge("deployed"):""}
      <div style="font-size:12px;color:var(--text-dim)">${title(x.attrs.asset_type)} · ${x.attrs.current_warehouse||""}</div>
    </div>`).join("");
  $("nearResults").querySelectorAll(".nrow").forEach(r => r.onclick = () => select(r.dataset.eid, true));
  if (window._nearMarker) gLayer.remove(window._nearMarker);
  window._nearMarker = new Graphic({geometry:nearPt, symbol:{type:"simple-marker", style:"x", color:"#fff", size:14, outline:{color:"#ee6e01", width:3}}});
  gLayer.add(window._nearMarker);
}

// ---- Mobilize / Return ----
$("btnMob").onclick = async () => {
  const x = byId[selected]; if (!x) return;
  const a = x.attrs;
  try {
    if (a.asset_status !== "deployed") {
      const inc = prompt("Incident ID (e.g. 2607MISSOURI):"); if (!inc) return;
      const name = prompt("Incident name (optional):") || null;
      const cred = await esriId.getCredential(PORTAL + "/sharing");
      await layers.deploy.applyEdits({addFeatures:[{attributes:{
        asset_guid: a.GlobalID, asset_equipment_id: a.equipment_id,
        incident_id: inc, incident_name: name, deploy_status: "mobilized",
        mobilized_date: Date.now(), mobilized_by: cred.userId,
        app_version: "webapp-beta", source_device: "browser"}}]});
      await layers.assets.applyEdits({updateFeatures:[{attributes:{OBJECTID: a.OBJECTID, asset_status: "deployed"}}]});
      a.asset_status = "deployed";
      toast(a.equipment_id + " mobilized to " + inc);
    } else {
      const q = await layers.deploy.queryFeatures({where:`asset_equipment_id='${a.equipment_id}' AND deploy_status='mobilized'`, outFields:["*"], num:1, orderByFields:["mobilized_date DESC"]});
      const cred = await esriId.getCredential(PORTAL + "/sharing");
      if (q.features.length){
        const d = q.features[0].attributes;
        await layers.deploy.applyEdits({updateFeatures:[{attributes:{OBJECTID:d.OBJECTID, deploy_status:"returned", returned_date:Date.now(), returned_by:cred.userId}}]});
      }
      await layers.assets.applyEdits({updateFeatures:[{attributes:{OBJECTID:a.OBJECTID, asset_status:"available"}}]});
      a.asset_status = "available";
      toast(a.equipment_id + " returned — post-deployment inspection required");
    }
    x.color = a.asset_status === "deployed" ? COLORS.deployed : COLORS[x.worst ? x.worst.sched_status : "none"];
    select(a.equipment_id, false);
  } catch(e){ console.error(e); toast("Edit failed: " + (e.message||e)); }
};

boot().catch(e => { console.error(e); $("loadMsg").textContent = "Failed to load: " + (e.message||e); });
});
</script>
